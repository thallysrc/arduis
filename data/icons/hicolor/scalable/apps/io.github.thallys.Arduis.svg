<?xml version="1.0" encoding="UTF-8"?>
<!--
  arduis app icon — pure static SVG, Dracula palette, GNOME 128px grid.
  One repo (cyan commit) forking into three parallel agents (green/purple/pink):
  the core value — N agents, each in its own worktree.
  No external refs, no <script>, no raster — safe static artwork (threat T-09-03).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#343746"/>
      <stop offset="1" stop-color="#21222c"/>
    </linearGradient>
  </defs>
  <!-- card -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="112" height="112" rx="26" fill="none" stroke="#000000" stroke-opacity="0.25" stroke-width="1"/>
  <!-- trunk commit (the repo) -->
  <circle cx="64" cy="100" r="9" fill="#8be9fd"/>
  <!-- trunk -->
  <path d="M 64 91 L 64 74" fill="none" stroke="#6272a4" stroke-width="7" stroke-linecap="round"/>
  <!-- three branches fanning out (parallel worktrees) -->
  <path d="M 64 74 C 64 58 38 64 38 46" fill="none" stroke="#6272a4" stroke-width="7" stroke-linecap="round"/>
  <path d="M 64 74 L 64 44" fill="none" stroke="#6272a4" stroke-width="7" stroke-linecap="round"/>
  <path d="M 64 74 C 64 58 90 64 90 46" fill="none" stroke="#6272a4" stroke-width="7" stroke-linecap="round"/>
  <!-- agent tips -->
  <circle cx="38" cy="38" r="9" fill="#50fa7b"/>
  <circle cx="64" cy="36" r="9" fill="#bd93f9"/>
  <circle cx="90" cy="38" r="9" fill="#ff79c6"/>
</svg>
